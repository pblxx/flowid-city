<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>looop.games - Director's Cut (Final Mobile Ready)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background-color: #12121a; 
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1e1e2f 0%, #12121a 100%);
        }
    </style>
</head>
<body oncontextmenu="return false;"> 

    <div id="camera-ui" style="position: absolute; top: 2.5%; right: 2%; z-index: 60;">
        <button id="viewToggleBtn" class="bg-slate-800/80 text-cyan-400 px-6 py-2 rounded-full border border-cyan-500 font-bold hover:bg-slate-700 transition shadow-[0_0_15px_rgba(6,182,212,0.4)] backdrop-blur-md cursor-pointer">
            <i class="fas fa-camera"></i> CAM: ISOMÉTRICA
        </button>
    </div>

    <!-- JOYSTICK MÓVIL (Oculto en PC, solo para pantallas táctiles) -->
    <div id="joystick-container" class="hidden absolute bottom-8 left-8 z-50 pointer-events-none">
        <div id="joystick-zone" class="relative w-32 h-32 md:w-36 md:h-36 rounded-full border-2 border-cyan-500/40 bg-gradient-to-br from-slate-900/90 to-slate-800/90 shadow-[0_0_30px_rgba(6,182,212,0.3),inset_0_0_20px_rgba(0,0,0,0.8)] backdrop-blur-md pointer-events-auto flex items-center justify-center overflow-hidden">
            <div class="absolute w-20 h-20 md:w-24 md:h-24 rounded-full border border-cyan-500/20"></div>
            <div class="absolute w-10 h-10 md:w-12 md:h-12 rounded-full border border-cyan-500/10"></div>
            <div id="joystick-knob" class="w-12 h-12 md:w-14 md:h-14 rounded-full bg-gradient-to-br from-cyan-300 to-cyan-600 shadow-[0_0_20px_rgba(6,182,212,1),inset_0_2px_4px_rgba(255,255,255,0.6)] absolute pointer-events-none"></div>
        </div>
    </div>

    <!-- BOTONES DE ACCIÓN (Visibles siempre: ratón y táctil) -->
    <div id="action-buttons" class="absolute bottom-8 right-8 flex flex-col gap-3 md:gap-4 pointer-events-auto items-end z-50">
        <div class="flex gap-3 md:gap-4 mb-1">
            <button id="btn-hoverboard" class="w-12 h-12 md:w-14 md:h-14 rounded-full border-2 border-cyan-400/50 bg-gradient-to-br from-slate-800/90 to-slate-900/90 text-cyan-300 font-bold shadow-[0_0_15px_rgba(6,182,212,0.4),inset_0_0_10px_rgba(0,0,0,0.5)] backdrop-blur-md active:scale-95 active:shadow-[0_0_25px_rgba(6,182,212,0.8)] transition-all flex items-center justify-center cursor-pointer">
                <i class="fas fa-rocket text-lg md:text-xl"></i>
            </button>
            <button id="btn-jump" class="w-12 h-12 md:w-14 md:h-14 rounded-full border-2 border-cyan-400/50 bg-gradient-to-br from-slate-800/90 to-slate-900/90 text-cyan-300 font-bold shadow-[0_0_15px_rgba(6,182,212,0.4),inset_0_0_10px_rgba(0,0,0,0.5)] backdrop-blur-md active:scale-95 active:shadow-[0_0_25px_rgba(6,182,212,0.8)] transition-all flex items-center justify-center cursor-pointer">
                <i class="fas fa-arrow-up text-lg md:text-xl"></i>
            </button>
        </div>
        <button id="btn-interact" class="w-16 h-16 md:w-20 md:h-20 rounded-full border-2 border-cyan-400/50 bg-gradient-to-br from-slate-800/90 to-slate-900/90 text-cyan-300 font-bold shadow-[0_0_20px_rgba(6,182,212,0.4),inset_0_0_15px_rgba(0,0,0,0.5)] backdrop-blur-md active:scale-95 active:shadow-[0_0_30px_rgba(6,182,212,0.8)] transition-all flex items-center justify-center cursor-pointer">
            <i class="fas fa-hand-pointer text-3xl md:text-4xl"></i>
        </button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- 1. CONFIGURACIÓN INICIAL ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let playerInventory = { coins: 9999, fish: 99, hasHoverboard: true };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        // --- 2. SISTEMA DE AUDIO ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        window.addEventListener('mousedown', initAudio, { once: true });
        window.addEventListener('keydown', initAudio, { once: true });

        function playSound(type, vol = 1) {
            if (!audioCtx || audioCtx.state !== 'running' || vol <= 0.01) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'jump') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(250, now); osc.frequency.exponentialRampToValueAtTime(500, now + 0.3);
                gain.gain.setValueAtTime(0.05 * vol, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'step') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(40, now + 0.04);
                gain.gain.setValueAtTime(0.015 * vol, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                osc.start(now); osc.stop(now + 0.04);
            } else if (type === 'splash') {
                osc.type = 'square'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gain.gain.setValueAtTime(0.1 * vol, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'powerup') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.linearRampToValueAtTime(900, now + 0.5);
                gain.gain.setValueAtTime(0.1 * vol, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            } else if (type === 'hoverboard') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(150, now + 0.5);
                gain.gain.setValueAtTime(0.03 * vol, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            }
        }
        
        function playSpatialSound(type, sourceX, sourceY) {
            let dx = player.x - sourceX; let dy = player.y - sourceY;
            let dist = Math.hypot(dx, dy); let maxDist = 1200;
            let vol = Math.max(0, 1 - (dist / maxDist));
            if (vol > 0) playSound(type, vol * vol); 
        }

        let viewMode = 'iso'; 

        // --- 3. CÁMARA Y ZOOM ---
        function toScreen(worldX, worldY, worldZ) { 
            if (viewMode === 'iso') {
                return { x: worldX - worldY, y: (worldX + worldY) / 2 - worldZ };
            } else {
                return { x: worldX, y: worldY * 0.5 - worldZ };
            }
        }
        function toWorld(screenX, screenY, cameraX, cameraY) { 
            let cx = window.innerWidth / 2; let cy = window.innerHeight * 0.6;
            let unzoomedX = (screenX - cx) / camera.zoom + cx; let unzoomedY = (screenY - cy) / camera.zoom + cy;
            let adjX = unzoomedX + cameraX; let adjY = unzoomedY + cameraY; 
            if (viewMode === 'iso') {
                return { x: (adjX + 2 * adjY) / 2, y: (2 * adjY - adjX) / 2 };
            } else {
                return { x: adjX, y: adjY / 0.5 }; 
            }
        }

        // --- ZOOM ADAPTATIVO MÓVIL/PC ---
        let initialZoom = window.innerWidth < 768 ? 0.5 : 0.85;
        const camera = { x: 0, y: 0, targetX: 0, targetY: 0, zoom: initialZoom, targetZoom: initialZoom };
        let mouseX = 0, mouseY = 0;

        window.addEventListener('mousemove', e => { mouseX = e.touches ? e.touches[0].clientX : e.clientX; mouseY = e.touches ? e.touches[0].clientY : e.clientY; });
        window.addEventListener('wheel', e => {
            e.preventDefault(); 
            camera.targetZoom += e.deltaY * -0.0015;
            camera.targetZoom = Math.max(0.3, Math.min(2.5, camera.targetZoom));
        }, { passive: false });

        // --- 4. ARRAYS Y MAPA ---
        const W_SIZE = 8800; 
        const BLOCK_SIZE = 800; 
        const ROAD_WIDTH = 300; 
        const STEP = BLOCK_SIZE + ROAD_WIDTH; 

        const SIDEWALK = 40; const ALLEY = 100;
        const BLDG_SIZE = (BLOCK_SIZE - (SIDEWALK * 2) - ALLEY) / 2;

        const START_X = (STEP * 4) - (ROAD_WIDTH / 2); 
        const START_Y = (STEP * 4) - (ROAD_WIDTH / 2); 

        const buildings = [];
        const sidewalks = [];
        const streetlights = [];
        const portals = [];
        const raindrops = []; 
        const holoTrees = []; 
        const parks = [];
        const lakes = [];
        const terminals = []; 
        const gachaMachines = []; 
        const fountains = []; 
        
        // CORRECCIÓN: Trenes alineados exactamente con el centro de las carreteras para evitar clipping
        const trains = [
            { x: -2000, y: 3150, z: 500, w: 800, l: 80, vx: 25, vy: 0, c: '#f43f5e' }, // Tren Rojo
            { x: W_SIZE + 1000, y: 5350, z: 650, w: 800, l: 80, vx: -22, vy: 0, c: '#06b6d4' }  // Nuevo Tren Azul (dirección opuesta)
        ];

        const bColors = ['#1a1b26', '#16161e', '#24283b', '#1f2335'];
        const playerNeonColors = ['#38bdf8', '#ec4899', '#10b981', '#facc15', '#a855f7', '#f43f5e', '#ffffff'];
        const neonColors = ['#06b6d4', '#ec4899', '#10b981', '#f59e0b', '#a855f7'];
        const treeColors = ['0, 255, 200', '255, 0, 150', '200, 0, 255'];
        
        const metroPlazasCoord = [{ bx: STEP * 3, by: STEP * 3 }, { bx: STEP * 6, by: STEP * 6 }];
        const normalParksCoord = []; 

        // Generación del Mapa con Inteligencia Espacial
        for (let bx = 0; bx < W_SIZE; bx += STEP) {
            for (let by = 0; by < W_SIZE; by += STEP) {
                let isMetroPlaza = metroPlazasCoord.some(p => p.bx === bx && p.by === by);
                let isAdjacentToMetro = metroPlazasCoord.some(p => Math.abs(p.bx - bx) <= STEP && Math.abs(p.by - by) <= STEP) && !isMetroPlaza;
                let isPark = false;

                if (isMetroPlaza) { isPark = true; } 
                else if (!isAdjacentToMetro && Math.random() > 0.85) {
                    let isTooClose = normalParksCoord.some(p => Math.abs(p.bx - bx) <= STEP * 1.5 && Math.abs(p.by - by) <= STEP * 1.5);
                    if (!isTooClose) { isPark = true; normalParksCoord.push({bx, by}); }
                }

                if (isPark) { 
                    parks.push({ x: bx, y: by, w: BLOCK_SIZE, l: BLOCK_SIZE });
                    if (isMetroPlaza) {
                        portals.push({ id: 'metro', name: 'Estación', color: '#f59e0b', x: bx + BLOCK_SIZE - 120, y: by + BLOCK_SIZE - 120, radius: 40, z: 0 });
                        fountains.push({ x: bx + BLOCK_SIZE/2, y: by + BLOCK_SIZE/2, radius: 220, phase: Math.random() * 10 });
                        let tColors = [treeColors[0], treeColors[1], treeColors[2], treeColors[0]];
                        let tPos = [[100,100], [BLOCK_SIZE-100, 100], [100, BLOCK_SIZE-100], [BLOCK_SIZE-100, BLOCK_SIZE-100]];
                        tPos.forEach((pos, idx) => { holoTrees.push({ x: bx + pos[0], y: by + pos[1], z: 90, phase: Math.random()*10, rgb: tColors[idx] }); });
                    } else {
                        lakes.push({ x: bx + BLOCK_SIZE/2, y: by + BLOCK_SIZE/2, radius: 250, phase: Math.random() * 10 });
                    }
                } else {
                    sidewalks.push({ x: bx, y: by, w: BLOCK_SIZE, l: BLOCK_SIZE });
                    for (let i = 0; i < 2; i++) {
                        for (let j = 0; j < 2; j++) {
                            let posX = bx + SIDEWALK + (i * (BLDG_SIZE + ALLEY));
                            let posY = by + SIDEWALK + (j * (BLDG_SIZE + ALLEY));
                            if (Math.random() < 0.85) {
                                buildings.push({ x: posX, y: posY, w: BLDG_SIZE, l: BLDG_SIZE, h: 400 + Math.random() * 800, cT: '#1f2335', cL: bColors[Math.floor(Math.random()*bColors.length)], cR: bColors[Math.floor(Math.random()*bColors.length)], neon: neonColors[Math.floor(Math.random()*neonColors.length)] });
                            }
                        }
                    }
                    if (Math.random() > 0.8) gachaMachines.push({ x: bx + BLOCK_SIZE - SIDEWALK + 5, y: by + SIDEWALK + 20, w: 30, l: 30, phase: 0 });
                    if (Math.random() > 0.7) terminals.push({ x: bx + 5, y: by + BLOCK_SIZE/2, w: 30, l: 30, color: '#06b6d4', phase: 0 });
                    streetlights.push({ x: bx + SIDEWALK/2, y: by + SIDEWALK/2, z: 0, color: '#facc15' });
                    streetlights.push({ x: bx + BLOCK_SIZE - SIDEWALK/2, y: by + BLOCK_SIZE - SIDEWALK/2, z: 0, color: '#facc15' });
                }
            }
        }

        // --- 5. ENTIDADES ---
        const player = { 
            x: START_X, y: START_Y, z: 0, baseZ: 0, vz: 0, targetX: START_X, targetY: START_Y, 
            radius: 20, color: playerNeonColors[0], name: 'Tú', speed: 5.5, // VELOCIDAD REDUCIDA PARA MEJOR CONTROL
            walkPhase: 0, lastStep: 0, hasHoverboard: true, hbVx: 0, hbVy: 0, isUsingHoverboard: false,
            activePet: 0, colorIndex: 0, fishingState: 0
        };

        const petData = { x: START_X, y: START_Y, z: 0, phase: 0, segments: Array.from({length: 8}, () => ({x: START_X, y: START_Y, z: 50})) };

        const bots = [];
        const botColors = ['#f472b6', '#a855f7', '#34d399', '#fbbf24', '#ef4444'];
        for(let i=0; i < 30; i++) {
            let bx = Math.random() * W_SIZE; let by = Math.random() * W_SIZE;
            bots.push({ x: bx, y: by, z: 0, baseZ: 0, vz: 0, targetX: bx, targetY: by, radius: 18, color: botColors[i % botColors.length], name: `Ciudadano ${i+1}`, speed: 1.5 + Math.random() * 1.5, idleTimer: 0, walkPhase: Math.random() * Math.PI, lastStep: 0 });
        }

        const keys = {};
        window.addEventListener('keydown', e => { 
            keys[e.key] = true; initAudio(); 
            if (e.key === 'b' || e.key === 'B') toggleHoverboard();
            if (e.key === 'e' || e.key === 'E') handleInteraction();
            if (e.key === ' ' || e.key === 'Spacebar') triggerJump();
        });
        window.addEventListener('keyup', e => { keys[e.key] = false; });

        // NUEVO: Reseteo de seguridad cuando la ventana pierde el foco
        window.addEventListener('blur', () => { 
            for (let k in keys) keys[k] = false; 
            joyActive = false; joyX = 0; joyY = 0;
            if(joystickKnob) joystickKnob.style.transform = `translate(0px, 0px)`;
        });

        // --- CONTROLES MÓVILES Y BOTONES UI ---
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isTouchDevice) { document.getElementById('joystick-container').classList.remove('hidden'); }

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joyX = 0, joyY = 0; let joyActive = false; let joyBaseX = 0, joyBaseY = 0;

        joystickZone.addEventListener('touchstart', (e) => {
            e.preventDefault(); joyActive = true;
            let rect = joystickZone.getBoundingClientRect();
            joyBaseX = rect.left + rect.width / 2; joyBaseY = rect.top + rect.height / 2;
            updateJoystick(e.touches[0]);
        }, {passive: false});

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joyActive) return; e.preventDefault(); updateJoystick(e.touches[0]);
        }, {passive: false});

        joystickZone.addEventListener('touchend', (e) => {
            e.preventDefault(); joyActive = false; joyX = 0; joyY = 0;
            joystickKnob.style.transform = `translate(0px, 0px)`;
        }, {passive: false});

        // NUEVO: Reseteo de seguridad si el gesto táctil es interrumpido por el sistema
        joystickZone.addEventListener('touchcancel', (e) => {
            e.preventDefault(); joyActive = false; joyX = 0; joyY = 0;
            joystickKnob.style.transform = `translate(0px, 0px)`;
        }, {passive: false});

        function updateJoystick(touch) {
            let dx = touch.clientX - joyBaseX; let dy = touch.clientY - joyBaseY;
            let maxRadius = 45; let distance = Math.hypot(dx, dy);
            if (distance > maxRadius) { dx = (dx / distance) * maxRadius; dy = (dy / distance) * maxRadius; }
            joyX = dx / maxRadius; joyY = dy / maxRadius;
            joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        // Action Buttons (Eventos universales para Táctil y Ratón de PC)
        function bindButton(id, action) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); action(); initAudio(); }, {passive:false});
            btn.addEventListener('mousedown', (e) => { e.preventDefault(); action(); initAudio(); });
        }

        bindButton('btn-hoverboard', toggleHoverboard);
        bindButton('btn-jump', triggerJump);
        bindButton('btn-interact', handleInteraction);

        function toggleHoverboard() {
            if(player.fishingState === 0 && playerInventory.hasHoverboard) {
                player.isUsingHoverboard = !player.isUsingHoverboard;
                playSound('jump', 1);
                createParticles(player.x, player.y, player.z, player.color, 20);
                if (!player.isUsingHoverboard) { player.hbVx = 0; player.hbVy = 0; }
                
                const btnHb = document.getElementById('btn-hoverboard');
                if (btnHb) {
                    if (player.isUsingHoverboard) {
                        btnHb.classList.remove('from-slate-800/90', 'to-slate-900/90', 'text-cyan-300');
                        btnHb.classList.add('from-cyan-400', 'to-blue-600', 'text-white', 'shadow-[0_0_25px_rgba(6,182,212,0.8)]');
                    } else {
                        btnHb.classList.remove('from-cyan-400', 'to-blue-600', 'text-white', 'shadow-[0_0_25px_rgba(6,182,212,0.8)]');
                        btnHb.classList.add('from-slate-800/90', 'to-slate-900/90', 'text-cyan-300');
                    }
                }
            }
        }

        function triggerJump() { 
            if (player.z <= player.baseZ + 5 && player.fishingState === 0 && !player.isUsingHoverboard) { player.vz = 14; playSound('jump', 1); } 
        }

        let initialPinchDistance = null;
        let initialZoomAtPinch = null;
        let clickEffects = [];
        let particles = [];
        let currentPortal = null;
        let nearestInteractable = null;

        function handleInteraction() {
            if (player.isUsingHoverboard) return; 
            if (player.fishingState === 1) { player.fishingState = 0; player.fishLake = null; } 
            else if (player.fishingState === 2) { player.fishingState = 0; player.fishLake = null; playSound('splash', 1); createParticles(player.x, player.y, player.z, '#06b6d4', 30); } 
            else if (nearestInteractable && nearestInteractable.type === 'lake') { player.fishingState = 1; player.fishLake = nearestInteractable.obj; player.fishWait = 100 + Math.random() * 200; } 
            else if (nearestInteractable && nearestInteractable.type === 'portal') { enterGame(); } 
            else if (nearestInteractable && nearestInteractable.type === 'gacha') { playSound('powerup', 1); createParticles(nearestInteractable.obj.x + 15, nearestInteractable.obj.y + 15, 60, '#ec4899', 30); player.activePet = Math.floor(Math.random() * 3) + 1; } 
            else if (nearestInteractable && nearestInteractable.type === 'terminal') { player.colorIndex = (player.colorIndex + 1) % playerNeonColors.length; player.color = playerNeonColors[player.colorIndex]; playSound('powerup', 1); createParticles(player.x, player.y, player.z, player.color, 30); }
        }

        function setMouseTarget(e) {
            initAudio();
            // Zoom: Detectar pinch to zoom
            if (e.type === 'touchstart' && e.touches && e.touches.length === 2) {
                let dx = e.touches[0].clientX - e.touches[1].clientX;
                let dy = e.touches[0].clientY - e.touches[1].clientY;
                initialPinchDistance = Math.hypot(dx, dy);
                initialZoomAtPinch = camera.targetZoom;
                return;
            }
            // Acción: Tap o click en canvas interactúa
            if (e.target === canvas && (!e.touches || e.touches.length === 1)) {
                handleInteraction();
                let mx = e.touches ? e.touches[0].clientX : e.clientX; 
                let my = e.touches ? e.touches[0].clientY : e.clientY;
                let worldPos = toWorld(mx, my, camera.x, camera.y);
                clickEffects.push({x: worldPos.x, y: worldPos.y, z: player.baseZ, radius: 0, alpha: 1});
            }
        }

        window.addEventListener('mousedown', setMouseTarget);
        window.addEventListener('touchstart', setMouseTarget, {passive: false});

        // Zoom: Movimiento del Pinch
        window.addEventListener('touchmove', (e) => {
            if (e.touches && e.touches.length === 2 && initialPinchDistance) {
                e.preventDefault();
                let dx = e.touches[0].clientX - e.touches[1].clientX;
                let dy = e.touches[0].clientY - e.touches[1].clientY;
                let currentDistance = Math.hypot(dx, dy);
                let ratio = currentDistance / initialPinchDistance;
                camera.targetZoom = Math.max(0.3, Math.min(2.5, initialZoomAtPinch * ratio));
            }
        }, {passive: false});

        document.getElementById('viewToggleBtn').addEventListener('click', () => {
            viewMode = viewMode === 'iso' ? 'ortho' : 'iso';
            document.getElementById('viewToggleBtn').innerHTML = `<i class="fas fa-camera"></i> CAM: ${viewMode === 'iso' ? 'ISOMÉTRICA' : 'ORTOGONAL'}`;
        });

        // --- 6. FÍSICAS Y ACTUALIZACIÓN ---
        function resolveHardCollision(char) {
            let pad = char.radius; let hit = false;
            if (char.x < pad) { char.x = pad; hit = true; }
            if (char.x > W_SIZE - pad) { char.x = W_SIZE - pad; hit = true; }
            if (char.y < pad) { char.y = pad; hit = true; }
            if (char.y > W_SIZE - pad) { char.y = W_SIZE - pad; hit = true; }
            
            buildings.forEach(b => {
                if (char.z < b.h - 10) {
                    if (char.x > b.x - pad && char.x < b.x + b.w + pad && char.y > b.y - pad && char.y < b.y + b.l + pad) {
                        let dl = Math.abs(char.x - (b.x - pad)); let dr = Math.abs(char.x - (b.x + b.w + pad));
                        let dt = Math.abs(char.y - (b.y - pad)); let db = Math.abs(char.y - (b.y + b.l + pad));
                        let min = Math.min(dl, dr, dt, db);
                        if (min === dl) char.x = b.x - pad; else if (min === dr) char.x = b.x + b.w + pad; else if (min === dt) char.y = b.y - pad; else char.y = b.y + b.l + pad;
                        hit = true;
                    }
                }
            });
            
            [...gachaMachines, ...terminals].forEach(k => {
                let kW = k.w || 40; let kL = k.l || 40;
                if (char.x > k.x - pad && char.x < k.x + kW + pad && char.y > k.y - pad && char.y < k.y + kL + pad) {
                    let cx = k.x + kW/2; let cy = k.y + kL/2;
                    if (Math.abs(char.x - cx) / kW > Math.abs(char.y - cy) / kL) char.x = char.x < cx ? k.x - pad : k.x + kW + pad;
                    else char.y = char.y < cy ? k.y - pad : k.y + kL + pad;
                    hit = true;
                }
            });

            lakes.forEach(l => {
                if (char.z > 20) return;
                let dx = char.x - l.x; let dy = char.y - l.y; let dist = Math.hypot(dx, dy);
                if (dist < l.radius + char.radius) {
                    let overlap = (l.radius + char.radius) - dist;
                    char.x += (dx/dist) * overlap; char.y += (dy/dist) * overlap;
                    hit = true;
                }
            });

            fountains.forEach(f => {
                if (char.z > 40) return;
                let dx = char.x - f.x; let dy = char.y - f.y; let dist = Math.hypot(dx, dy);
                if (dist < f.radius + char.radius) {
                    let overlap = (f.radius + char.radius) - dist; char.x += (dx/dist) * overlap; char.y += (dy/dist) * overlap; hit = true;
                }
            });
            
            if (hit && char !== player) { char.targetX = char.x; char.targetY = char.y; char.idleTimer = 60; }
        }

        let isMovingPlayer = false;
        function update() {
            camera.zoom += (camera.targetZoom - camera.zoom) * 0.1;
            fountains.forEach(f => f.phase += 0.05);
            gachaMachines.forEach(g => g.phase += 0.05);
            terminals.forEach(t => t.phase += 0.05);
            
            // Actualización de trenes para que funcionen en ambas direcciones
            trains.forEach(t => { 
                t.x += t.vx; 
                t.y += t.vy; 
                if(t.vx > 0 && t.x > W_SIZE + 2000) t.x = -2000; 
                if(t.vx < 0 && t.x < -2000) t.x = W_SIZE + 2000;
            });

            if (player.fishingState === 0) { 
                let mx = 0, my = 0;
                let kActive = keys['w'] || keys['W'] || keys['ArrowUp'] || keys['s'] || keys['S'] || keys['ArrowDown'] || keys['a'] || keys['A'] || keys['ArrowLeft'] || keys['d'] || keys['D'] || keys['ArrowRight'];
                
                let joystickIntensity = Math.min(1, Math.hypot(joyX, joyY));

                if (kActive) {
                    if (viewMode === 'iso') {
                        if (keys['w'] || keys['W'] || keys['ArrowUp']) { mx -= 1; my -= 1; }
                        if (keys['s'] || keys['S'] || keys['ArrowDown']) { mx += 1; my += 1; }
                        if (keys['a'] || keys['A'] || keys['ArrowLeft']) { mx -= 1; my += 1; }
                        if (keys['d'] || keys['D'] || keys['ArrowRight']) { mx += 1; my -= 1; }
                    } else {
                        if (keys['w'] || keys['W'] || keys['ArrowUp']) { my -= 1; }
                        if (keys['s'] || keys['S'] || keys['ArrowDown']) { my += 1; }
                        if (keys['a'] || keys['A'] || keys['ArrowLeft']) { mx -= 1; }
                        if (keys['d'] || keys['D'] || keys['ArrowRight']) { mx += 1; }
                    }
                } else if (joystickIntensity > 0.05) {
                    if (viewMode === 'iso') { mx = joyY + joyX; my = joyY - joyX; } 
                    else { mx = joyX; my = joyY; }
                }
                
                isMovingPlayer = false;
                if (player.isUsingHoverboard) {
                    let acc = 1.2; let fri = 0.94;
                    if (mx !== 0 || my !== 0) {
                        let l = Math.hypot(mx, my); 
                        let intensity = kActive ? 1 : joystickIntensity;
                        player.hbVx += (mx / l) * acc * intensity; player.hbVy += (my / l) * acc * intensity;
                    }
                    player.hbVx *= fri; player.hbVy *= fri;
                    player.x += player.hbVx; player.y += player.hbVy;
                    isMovingPlayer = Math.hypot(player.hbVx, player.hbVy) > 0.5;
                } else if (mx !== 0 || my !== 0) {
                    let l = Math.hypot(mx, my);
                    let intensity = kActive ? 1 : joystickIntensity;
                    player.x += (mx / l) * player.speed * intensity; 
                    player.y += (my / l) * player.speed * intensity;
                    isMovingPlayer = true;
                }
                resolveHardCollision(player);
            }

            const all = [...bots, player];
            all.forEach(c => {
                c.z += c.vz; if (c.z > 0 || c.vz > 0) c.vz -= 0.6; if (c.z <= 0) { c.z = 0; c.vz = 0; }
                let moving = (c === player) ? isMovingPlayer : Math.hypot(c.targetX - c.x, c.targetY - c.y) > c.speed;
                if (moving) c.walkPhase += 0.4; else c.walkPhase = 0;
            });

            bots.forEach(b => {
                if (Math.hypot(b.targetX - b.x, b.targetY - b.y) > b.speed) {
                    let l = Math.hypot(b.targetX - b.x, b.targetY - b.y);
                    b.x += ((b.targetX - b.x) / l) * b.speed; b.y += ((b.targetY - b.y) / l) * b.speed;
                    resolveHardCollision(b);
                } else {
                    b.idleTimer--;
                    if (b.idleTimer <= 0) { b.targetX = b.x + (Math.random()*600-300); b.targetY = b.y + (Math.random()*600-300); b.idleTimer = 200; }
                }
            });

            if (player.activePet > 0) {
                petData.phase += 0.1;
                if (player.activePet === 3) {
                    let tX = player.x - 50 * Math.cos(petData.phase * 0.5); let tY = player.y - 50 * Math.sin(petData.phase * 0.5); let tZ = player.z + 40 + Math.sin(petData.phase) * 20;
                    petData.segments[0].x += (tX - petData.segments[0].x) * 0.1; petData.segments[0].y += (tY - petData.segments[0].y) * 0.1; petData.segments[0].z += (tZ - petData.segments[0].z) * 0.1;
                    for(let i=1; i<petData.segments.length; i++) {
                        let prev = petData.segments[i-1]; let curr = petData.segments[i];
                        curr.x += (prev.x - curr.x) * 0.3; curr.y += (prev.y - curr.y) * 0.3; curr.z += (prev.z - curr.z) * 0.3;
                    }
                } else {
                    let tX = player.x - 30 * Math.cos(player.walkPhase || petData.phase);
                    let tY = player.y - 30 * Math.sin(player.walkPhase || petData.phase);
                    let tZ = player.activePet === 1 ? player.z + Math.abs(Math.sin(petData.phase))*15 : player.z + 40 + Math.sin(petData.phase)*10;
                    petData.x = petData.x || player.x; petData.y = petData.y || player.y; petData.z = petData.z || player.z;
                    petData.x += (tX - petData.x) * 0.1; petData.y += (tY - petData.y) * 0.1; petData.z += (tZ - petData.z) * 0.1;
                }
            }

            if (player.fishingState === 1) {
                player.fishWait--;
                if (player.fishWait <= 0) { player.fishingState = 2; player.fishWait = 80; playSound('splash', 1); createParticles(player.fishLake.x, player.fishLake.y, 15, '#06b6d4', 20); }
            } else if (player.fishingState === 2) {
                player.fishWait--;
                if (player.fishWait <= 0) { player.fishingState = 0; player.fishLake = null; }
            }

            nearestInteractable = null;
            if (player.fishingState === 0 && !player.isUsingHoverboard && player.z === 0) {
                lakes.forEach(l => { if (Math.hypot(player.x - l.x, player.y - l.y) < l.radius + 60) nearestInteractable = { type: 'lake', obj: l }; });
                fountains.forEach(f => { if (Math.hypot(player.x - f.x, player.y - f.y) < f.radius + 60) nearestInteractable = { type: 'lake', obj: f }; });
                gachaMachines.forEach(g => { if (Math.hypot(player.x - (g.x+g.w/2), player.y - (g.y+g.l/2)) < 60) nearestInteractable = { type: 'gacha', obj: g }; });
                terminals.forEach(t => { if (Math.hypot(player.x - (t.x+t.w/2), player.y - (t.y+t.l/2)) < 60) nearestInteractable = { type: 'terminal', obj: t }; });
            }

            let touchingPortal = null;
            if (player.fishingState === 0 && !player.isUsingHoverboard && player.z === 0) {
                for(let p of portals) { if (Math.hypot(player.x - p.x, player.y - p.y) < p.radius && Math.abs(player.z - p.z) < 50) { touchingPortal = p; break; } }
            }
            if (touchingPortal !== currentPortal) { currentPortal = touchingPortal; if (currentPortal) { nearestInteractable = { type: 'portal', obj: currentPortal }; } }

            // Lluvia
            if (Math.random() > 0.4) {
                raindrops.push({ x: player.x + (Math.random() * 3000 - 1500), y: player.y + (Math.random() * 3000 - 1500), z: 1200, vx: 4, vy: 6, vz: -80, color: 'rgba(255, 255, 255, 0.25)' });
            }

            camera.x += (toScreen(player.x, player.y, player.z).x - canvas.width/2 - camera.x) * 0.08;
            camera.y += (toScreen(player.x, player.y, player.z).y - canvas.height*0.6 - camera.y) * 0.08;
            
            for (let i = clickEffects.length - 1; i >= 0; i--) { clickEffects[i].radius += 2; clickEffects[i].alpha -= 0.05; if (clickEffects[i].alpha <= 0) clickEffects.splice(i, 1); }
            for (let i = particles.length - 1; i >= 0; i--) { let p = particles[i]; p.x += p.vx; p.y += p.vy; p.z += p.vz; p.vz -= 0.5; p.life -= 0.02; if(p.z < 0) { p.z = 0; p.vz *= -0.5; } if(p.life <= 0) particles.splice(i, 1); }
            for (let i = raindrops.length - 1; i >= 0; i--) { let r = raindrops[i]; r.x += r.vx; r.y += r.vy; r.z += r.vz; if (r.z < 0) { if (Math.random() > 0.9) createParticles(r.x, r.y, 0, r.color, 1); raindrops.splice(i, 1); } }
        }

        // --- 7. RENDERIZADO ---
        function getCenterDepth(type, item) {
            let cx, cy;
            if (type === 'building' || type === 'park') { cx = item.x + item.w / 2; cy = item.y + item.l / 2; } 
            else if (type === 'gacha' || type === 'terminal' || type === 'train') { cx = item.x + item.w / 2; cy = item.y + item.l / 2; } 
            else if (type === 'pet' && player.activePet === 3) { cx = petData.segments[0].x; cy = petData.segments[0].y; } 
            else { cx = item.x; cy = item.y; }
            return viewMode === 'iso' ? (cx + cy) : cy;
        }

        function drawIsoBox(x, y, z, w, l, h, colorTop, colorLeft, colorRight) {
            let pTopBack = toScreen(x, y, z + h); let pTopRight = toScreen(x + w, y, z + h); let pTopFront = toScreen(x + w, y + l, z + h); let pTopLeft = toScreen(x, y + l, z + h);
            let pBotFront = toScreen(x + w, y + l, z); let pBotLeft = toScreen(x, y + l, z); let pBotRight = toScreen(x + w, y, z);
            ctx.fillStyle = colorTop; ctx.beginPath(); ctx.moveTo(pTopBack.x, pTopBack.y); ctx.lineTo(pTopRight.x, pTopRight.y); ctx.lineTo(pTopFront.x, pTopFront.y); ctx.lineTo(pTopLeft.x, pTopLeft.y); ctx.fill();
            ctx.fillStyle = colorLeft; ctx.beginPath(); ctx.moveTo(pTopLeft.x, pTopLeft.y); ctx.lineTo(pTopFront.x, pTopFront.y); ctx.lineTo(pBotFront.x, pBotFront.y); ctx.lineTo(pBotLeft.x, pBotLeft.y); ctx.fill();
            ctx.fillStyle = colorRight; ctx.beginPath(); ctx.moveTo(pTopFront.x, pTopFront.y); ctx.lineTo(pTopRight.x, pTopRight.y); ctx.lineTo(pBotRight.x, pBotRight.y); ctx.lineTo(pBotFront.x, pBotFront.y); ctx.fill();
        }

        function drawIsoPoly(points, color) {
            ctx.fillStyle = color; ctx.beginPath(); let first = toScreen(points[0].x, points[0].y, points[0].z); ctx.moveTo(first.x, first.y);
            for(let i=1; i<points.length; i++) { let pt = toScreen(points[i].x, points[i].y, points[i].z); ctx.lineTo(pt.x, pt.y); }
            ctx.fill();
        }

        function drawCylinder(x, y, z, radius, height, colorTop, colorSide) {
            let b = toScreen(x, y, z); let t = toScreen(x, y, z + height);
            ctx.fillStyle = colorSide; ctx.beginPath(); ctx.ellipse(b.x, b.y, radius, radius*0.5, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(b.x - radius, b.y); ctx.lineTo(t.x - radius, t.y); ctx.lineTo(t.x + radius, t.y); ctx.lineTo(b.x + radius, b.y); ctx.fill();
            ctx.fillStyle = colorTop; ctx.beginPath(); ctx.ellipse(t.x, t.y, radius, radius*0.5, 0, 0, Math.PI*2); ctx.fill();
        }

        function drawBuilding(b) {
            drawIsoBox(b.x, b.y, 0, b.w, b.l, 10, '#12121a', '#0a0a0f', '#0a0a0f');
            let pScreen = toScreen(player.x, player.y, player.z); let bFrontScreenY = toScreen(b.x, b.y + b.l, 0).y; let bBackRoofScreenY = toScreen(b.x, b.y, b.h).y;
            let isObscuring = false;
            
            if (viewMode === 'iso') {
                let bDepth = b.x + b.y + Math.max(b.w, b.l); let bCenterScreen = toScreen(b.x + b.w/2, b.y + b.l/2, 0);
                let dxScreen = Math.abs(pScreen.x - bCenterScreen.x); let dyScreen = bCenterScreen.y - pScreen.y;
                if (bDepth > (player.x + player.y) - 300 && player.z < b.h && dxScreen < (b.w + b.l) * 1.5 && dyScreen > -400 && dyScreen < b.h + 400) isObscuring = true;
            } else {
                if (player.y < b.y + b.l && player.x > b.x - 30 && player.x < b.x + b.w + 30 && pScreen.y < bFrontScreenY && pScreen.y > bBackRoofScreenY) isObscuring = true;
            }

            if (isObscuring) {
                ctx.strokeStyle = `rgba(6, 182, 212, 0.25)`; ctx.lineWidth = 2;
                let p1 = toScreen(b.x, b.y + b.l, 10); let p2 = toScreen(b.x + b.w, b.y + b.l, 10); let p3 = toScreen(b.x + b.w, b.y, 10); let p4 = toScreen(b.x, b.y, 10);
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.closePath(); ctx.stroke(); return; 
            }
            
            drawIsoBox(b.x, b.y, 10, b.w, b.l, b.h - 10, b.cT, b.cL, b.cR);
            ctx.globalCompositeOperation = 'screen'; ctx.fillStyle = b.neon; let neonThickness = 6; 
            for(let hz = 150; hz < b.h - 50; hz += 200) {
                drawIsoPoly([{x:b.x, y:b.y+b.l+0.5, z:hz}, {x:b.x+b.w, y:b.y+b.l+0.5, z:hz}, {x:b.x+b.w, y:b.y+b.l+0.5, z:hz+neonThickness}, {x:b.x, y:b.y+b.l+0.5, z:hz+neonThickness}], b.neon);
                if (viewMode === 'iso') drawIsoPoly([{x:b.x+b.w+0.5, y:b.y, z:hz}, {x:b.x+b.w+0.5, y:b.y+b.l, z:hz}, {x:b.x+b.w+0.5, y:b.y+b.l, z:hz+neonThickness}, {x:b.x+b.w+0.5, y:b.y, z:hz+neonThickness}], b.neon);
            }
            ctx.globalCompositeOperation = 'source-over'; 
            drawIsoBox(b.x, b.y, b.h, b.w, b.l, 15, '#1f2335', '#16161e', '#16161e');
        }

        function drawPark(p) {
            drawIsoBox(p.x, p.y, 0, p.w, p.l, 10, '#151923', '#0a0a0f', '#0a0a0f'); 
            ctx.strokeStyle = 'rgba(16, 185, 129, 0.15)'; ctx.lineWidth = 1;
            for(let i=20; i<p.w; i+=40) { let pt1 = toScreen(p.x+i, p.y, 10); let pt2 = toScreen(p.x+i, p.y+p.l, 10); ctx.beginPath(); ctx.moveTo(pt1.x, pt1.y); ctx.lineTo(pt2.x, pt2.y); ctx.stroke(); }
            for(let i=20; i<p.l; i+=40) { let pt1 = toScreen(p.x, p.y+i, 10); let pt2 = toScreen(p.x+p.w, p.y+i, 10); ctx.beginPath(); ctx.moveTo(pt1.x, pt1.y); ctx.lineTo(pt2.x, pt2.y); ctx.stroke(); }
        }

        function drawLake(l) {
            let pos = toScreen(l.x, l.y, 0); let topPos = toScreen(l.x, l.y, 15); 
            ctx.fillStyle = '#16161e'; ctx.beginPath(); ctx.ellipse(pos.x, pos.y, l.radius, l.radius*0.5, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(pos.x - l.radius, pos.y); ctx.lineTo(topPos.x - l.radius, topPos.y); ctx.lineTo(topPos.x + l.radius, topPos.y); ctx.lineTo(pos.x + l.radius, pos.y); ctx.fill();
            ctx.strokeStyle = 'rgba(14, 165, 233, 0.9)'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.ellipse(topPos.x, topPos.y, l.radius, l.radius*0.5, 0, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = 'rgba(6, 182, 212, 0.2)'; ctx.beginPath(); ctx.ellipse(topPos.x, topPos.y, l.radius-2, (l.radius-2)*0.5, 0, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.lineWidth = 1;
            for(let r = (l.phase*10)%40; r < l.radius; r += 40) { ctx.beginPath(); ctx.ellipse(pos.x, pos.y, r, r*0.5, 0, 0, Math.PI*2); ctx.stroke(); }
            if (player.fishingState > 0 && player.fishLake === l) {
                let playerPos = toScreen(player.x, player.y, player.z + 10); let bobberPos = { x: topPos.x + Math.cos(l.phase)*30, y: topPos.y + Math.sin(l.phase)*15 };
                ctx.strokeStyle = '#facc15'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(playerPos.x, playerPos.y); ctx.lineTo(bobberPos.x, bobberPos.y); ctx.stroke();
                ctx.fillStyle = player.fishingState === 2 ? '#ef4444' : '#fff'; ctx.beginPath(); ctx.arc(bobberPos.x, bobberPos.y, 4, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawFountain(f) {
            drawCylinder(f.x, f.y, 0, f.radius, 15, '#16161e', '#0a0a0f');
            let w = toScreen(f.x, f.y, 14); ctx.fillStyle = 'rgba(6, 182, 212, 0.3)'; ctx.beginPath(); ctx.ellipse(w.x, w.y, f.radius - 5, (f.radius - 5)*0.5, 0, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = 'rgba(6, 182, 212, 0.5)'; ctx.lineWidth = 1.5;
            for(let r = (f.phase*15) % (f.radius-10); r < f.radius-10; r += 25) { if(r > 0) { ctx.beginPath(); ctx.ellipse(w.x, w.y, r, r*0.5, 0, 0, Math.PI*2); ctx.stroke(); } }
            if (player.fishingState > 0 && player.fishLake === f) {
                let playerPos = toScreen(player.x, player.y, player.z + 10); let bobberPos = { x: w.x + Math.cos(f.phase)*30, y: w.y + Math.sin(f.phase)*15 };
                ctx.strokeStyle = '#facc15'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(playerPos.x, playerPos.y); ctx.lineTo(bobberPos.x, bobberPos.y); ctx.stroke();
                ctx.fillStyle = player.fishingState === 2 ? '#ef4444' : '#fff'; ctx.beginPath(); ctx.arc(bobberPos.x, bobberPos.y, 4, 0, Math.PI*2); ctx.fill();
            }
        }

        function drawGacha(g) {
            drawIsoBox(g.x, g.y, 0, g.w, g.l, 40, '#24283b', '#16161e', '#1a1b26');
            let ballPos = toScreen(g.x + g.w/2, g.y + g.l/2, 40); ctx.fillStyle = 'rgba(236, 72, 153, 0.8)'; ctx.beginPath(); ctx.arc(ballPos.x, ballPos.y, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ballPos.x - 5, ballPos.y + Math.sin(g.phase)*3, 2.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(ballPos.x + 5, ballPos.y + Math.cos(g.phase)*3, 2.5, 0, Math.PI*2); ctx.fill();
        }

        function drawTerminal(t) {
            drawIsoBox(t.x, t.y, 0, t.w, t.l, 30, '#24283b', '#16161e', '#1a1b26');
            let screenPos = toScreen(t.x + t.w/2, t.y + t.l/2, 35); ctx.fillStyle = t.color; ctx.beginPath(); ctx.ellipse(screenPos.x, screenPos.y, 10, 5, 0, 0, Math.PI*2); ctx.fill();
        }

        function drawTrain(t) { drawIsoBox(t.x, t.y, t.z, t.w, t.l, 80, '#334155', '#1e293b', '#0f172a'); drawIsoBox(t.x, t.y - 2, t.z + 30, t.w, t.l + 4, 15, t.c, t.c, t.c); }

        function drawStreetlight(sl) {
            let base = toScreen(sl.x, sl.y, sl.z); let top = toScreen(sl.x, sl.y, sl.z + 120);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(base.x, base.y); ctx.lineTo(top.x, top.y); ctx.stroke();
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(top.x, top.y, 3.5, 0, Math.PI*2); ctx.fill();
        }

        function drawHoloTree(t) {
            let base = toScreen(t.x, t.y, 10); let top = toScreen(t.x, t.y, t.z);
            ctx.strokeStyle = `rgba(16, 185, 129, ${0.4 + Math.sin(t.phase)*0.1})`; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(base.x, base.y); ctx.lineTo(top.x, top.y); ctx.stroke();
            ctx.strokeStyle = `rgba(${t.rgb}, 0.9)`; ctx.lineWidth = 1.5;
            for(let i=1; i<=3; i++) { let canopyPos = toScreen(t.x, t.y, t.z - (i*15)); let radius = i * 12 + Math.sin(t.phase * 1.5) * 4; ctx.beginPath(); ctx.ellipse(canopyPos.x, canopyPos.y, radius, radius*0.5, 0, 0, Math.PI*2); ctx.stroke(); ctx.fillStyle = `rgba(${t.rgb}, 0.15)`; ctx.fill(); }
        }

        function drawPet() {
            if (player.activePet === 0) return;
            let pColor = player.activePet === 1 ? '#06b6d4' : (player.activePet === 2 ? '#facc15' : '#10b981');
            if (player.activePet === 3) {
                for(let i = petData.segments.length - 1; i >= 0; i--) {
                    let seg = petData.segments[i]; let pos = toScreen(seg.x, seg.y, seg.z); let isHead = (i === 0); let size = isHead ? 8 : 6 - i;
                    ctx.fillStyle = isHead ? '#fff' : pColor; ctx.beginPath(); ctx.arc(pos.x, pos.y, size, 0, Math.PI*2); ctx.fill();
                    if (isHead) { ctx.strokeStyle = pColor; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(pos.x, pos.y, size + 4, 0, Math.PI*2); ctx.stroke(); }
                    if (i > 0) { let prev = toScreen(petData.segments[i-1].x, petData.segments[i-1].y, petData.segments[i-1].z); ctx.strokeStyle = `rgba(16, 185, 129, 0.4)`; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(prev.x, prev.y); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
                }
            } else {
                let pos = toScreen(petData.x, petData.y, petData.z); ctx.fillStyle = '#fff';
                if (player.activePet === 1) { ctx.beginPath(); ctx.arc(pos.x, pos.y, 5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.moveTo(pos.x-5, pos.y-2); ctx.lineTo(pos.x-7, pos.y-7); ctx.lineTo(pos.x-2, pos.y-5); ctx.fill(); ctx.beginPath(); ctx.moveTo(pos.x+5, pos.y-2); ctx.lineTo(pos.x+7, pos.y-7); ctx.lineTo(pos.x+2, pos.y-5); ctx.fill(); } 
                else { ctx.beginPath(); ctx.moveTo(pos.x, pos.y-6); ctx.lineTo(pos.x+6, pos.y); ctx.lineTo(pos.x, pos.y+6); ctx.lineTo(pos.x-6, pos.y); ctx.fill(); ctx.strokeStyle = pColor; ctx.lineWidth=1.5; ctx.beginPath(); ctx.ellipse(pos.x, pos.y, 12, 4, 0, 0, Math.PI*2); ctx.stroke(); }
            }
        }

        function drawPortal(portal) {
            let pZ = portal.z; drawIsoBox(portal.x - portal.radius, portal.y - portal.radius, 8, portal.radius*2, portal.radius*2, pZ, '#24283b', '#16161e', '#1a1b26');
            let pos = toScreen(portal.x, portal.y, pZ + 13); ctx.fillStyle = portal.color + '80'; ctx.beginPath(); ctx.ellipse(pos.x, pos.y, portal.radius, portal.radius*0.5, 0, 0, Math.PI*2); ctx.fill(); 
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.ellipse(pos.x, pos.y, portal.radius*0.8, portal.radius*0.4, 0, 0, Math.PI*2); ctx.stroke();
        }

        function drawCharacter(c) {
            let isP = c === player; let bounce = (c.walkPhase > 0 && c.z <= c.baseZ + 5) ? Math.abs(Math.sin(c.walkPhase)) * 12 : 0;
            let currentZ = c.baseZ || 0; let s = toScreen(c.x, c.y, currentZ); let p = toScreen(c.x, c.y, c.z + bounce + c.radius);
            let sShrink = (c.z + bounce - currentZ) * 0.4;
            
            if (sShrink < c.radius * 1.2) { ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(s.x, s.y, (c.radius*1.2) - sShrink, (c.radius*0.6) - (sShrink*0.5), 0, 0, Math.PI*2); ctx.fill(); }
            if (isP && !c.isUsingHoverboard) { ctx.fillStyle = c.color; ctx.globalAlpha = 0.15; ctx.beginPath(); ctx.ellipse(s.x, s.y, c.radius*2.5, c.radius*1.2, 0, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; }
            
            ctx.save(); ctx.lineWidth = 2.5; ctx.strokeStyle = '#12121a'; ctx.fillStyle = c.color;
            if (isP && (c.speedBoost > 5 || c.isUsingHoverboard)) { ctx.translate(p.x, p.y); ctx.rotate(0.2); ctx.translate(-p.x, -p.y); }
            if (isP && player.isUsingHoverboard) {
                let hbPos = toScreen(c.x, c.y, c.z + bounce + 5); ctx.save(); ctx.translate(hbPos.x, hbPos.y); ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.ellipse(0, 0, 22, 10, 0, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = player.color; ctx.lineWidth = 2.5; ctx.stroke(); ctx.restore(); p.y -= 10; 
            }

            let bw = c.radius*1.6; let bh = c.radius*1.2; let bx = p.x - bw/2; let by = p.y; let br = 8; 
            ctx.beginPath(); ctx.moveTo(bx+br, by); ctx.lineTo(bx+bw-br, by); ctx.arcTo(bx+bw, by, bx+bw, by+br, br); ctx.lineTo(bx+bw, by+bh-br); ctx.arcTo(bx+bw, by+bh, bx+bw-br, by+bh, br); ctx.lineTo(bx+br, by+bh); ctx.arcTo(bx, by+bh, bx, by+bh-br, br); ctx.lineTo(bx, by+br); ctx.arcTo(bx, by, bx+br, by, br); ctx.closePath(); ctx.fill(); ctx.stroke();
            
            let handO = (c.walkPhase > 0 && c.z <= currentZ + 5) ? Math.sin(c.walkPhase) * 6 : 0; ctx.fillStyle = '#ffdfc4'; let fO = (isP && player.fishingState > 0) ? -15 : handO;
            ctx.beginPath(); ctx.arc(p.x - c.radius*0.85, by + bh*0.7 + fO, c.radius*0.35, 0, Math.PI*2); ctx.fill(); ctx.stroke(); ctx.beginPath(); ctx.arc(p.x + c.radius*0.85, by + bh*0.7 - handO, c.radius*0.35, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            
            let headY = p.y - c.radius * 0.2; ctx.beginPath(); ctx.arc(p.x, headY, c.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#12121a'; ctx.beginPath(); ctx.arc(p.x - 4, headY + 2, 2.5, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(p.x + 6, headY + 2, 2.5, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
            ctx.fillStyle = isP ? '#facc15' : '#ffffff'; ctx.font = 'bold 12px Nunito'; ctx.textAlign = 'center'; ctx.fillText(c.name, p.x, p.y - c.radius - 15);
        }

        function drawCityTerrain(viewRadius) {
            drawIsoBox(0, 0, -20, W_SIZE, W_SIZE, 20, '#11111a', '#0a0a10', '#0a0a10');
            parks.forEach(p => { if (Math.abs(player.x - (p.x + p.w/2)) < viewRadius && Math.abs(player.y - (p.y + p.l/2)) < viewRadius) { drawPark(p); } });
            sidewalks.forEach(s => {
                if (Math.abs(player.x - (s.x + s.w/2)) < viewRadius && Math.abs(player.y - (s.y + s.l/2)) < viewRadius) {
                    drawIsoBox(s.x, s.y, 0, s.w, s.l, 8, '#1f2335', '#16161e', '#16161e');
                    ctx.strokeStyle = 'rgba(6, 182, 212, 0.6)'; ctx.lineWidth = 1.5; let pts = [toScreen(s.x, s.y, 8), toScreen(s.x+s.w, s.y, 8), toScreen(s.x+s.w, s.y+s.l, 8), toScreen(s.x, s.y+s.l, 8)];
                    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); ctx.lineTo(pts[1].x, pts[1].y); ctx.lineTo(pts[2].x, pts[2].y); ctx.lineTo(pts[3].x, pts[3].y); ctx.closePath(); ctx.stroke();
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save();
            ctx.translate(canvas.width / 2, canvas.height * 0.6); ctx.scale(camera.zoom, camera.zoom); ctx.translate(-canvas.width / 2 - camera.x, -canvas.height * 0.6 - camera.y);
            
            let viewRadius = 2500 / camera.zoom; 
            drawCityTerrain(viewRadius);

            let render = [];
            buildings.forEach(b => { if(Math.abs(player.x - (b.x+b.w/2)) < viewRadius && Math.abs(player.y - (b.y+b.l/2)) < viewRadius) render.push({ t: 'building', d: b, z: getCenterDepth('building', b) }); });
            fountains.forEach(f => { if(Math.abs(player.x - f.x) < viewRadius && Math.abs(player.y - f.y) < viewRadius) render.push({ t: 'fountain', d: f, z: getCenterDepth('fountain', f) }); });
            lakes.forEach(l => { if(Math.abs(player.x - l.x) < viewRadius && Math.abs(player.y - l.y) < viewRadius) render.push({ t: 'lake', d: l, z: getCenterDepth('lake', l) }); });
            gachaMachines.forEach(g => { if(Math.abs(player.x - g.x) < viewRadius && Math.abs(player.y - g.y) < viewRadius) render.push({ t: 'gacha', d: g, z: getCenterDepth('gacha', g) }); });
            terminals.forEach(t => { if(Math.abs(player.x - t.x) < viewRadius && Math.abs(player.y - t.y) < viewRadius) render.push({ t: 'terminal', d: t, z: getCenterDepth('terminal', t) }); });
            holoTrees.forEach(t => { if(Math.abs(player.x - t.x) < viewRadius && Math.abs(player.y - t.y) < viewRadius) render.push({ t: 'holotree', d: t, z: getCenterDepth('holotree', t) }); });
            streetlights.forEach(sl => { if(Math.abs(player.x - sl.x) < viewRadius && Math.abs(player.y - sl.y) < viewRadius) render.push({ t: 'streetlight', d: sl, z: getCenterDepth('streetlight', sl) }); });
            portals.forEach(p => { if(Math.abs(player.x - p.x) < viewRadius && Math.abs(player.y - p.y) < viewRadius) render.push({ t: 'portal', d: p, z: getCenterDepth('portal', p) }); });
            trains.forEach(tr => render.push({ t: 'train', d: tr, z: getCenterDepth('train', tr) }));
            
            [...bots, player].forEach(c => { if(Math.abs(player.x - c.x) < viewRadius && Math.abs(player.y - c.y) < viewRadius) render.push({ t: 'char', d: c, z: getCenterDepth('char', c) }); });
            if (player.activePet > 0) render.push({ t: 'pet', d: null, z: getCenterDepth('pet', null) });

            render.sort((a,b) => a.z - b.z);
            
            render.forEach(i => {
                if(i.t==='building') drawBuilding(i.d); else if(i.t==='fountain') drawFountain(i.d); else if(i.t==='lake') drawLake(i.d); 
                else if(i.t==='gacha') drawGacha(i.d); else if(i.t==='terminal') drawTerminal(i.d); else if(i.t==='holotree') drawHoloTree(i.d); 
                else if(i.t==='streetlight') drawStreetlight(i.d); else if(i.t==='portal') drawPortal(i.d); else if(i.t==='train') drawTrain(i.d); 
                else if(i.t==='char') drawCharacter(i.d); else if(i.t==='pet') drawPet();
            });
            
            ctx.globalCompositeOperation = 'screen';
            ctx.lineWidth = 1.5;
            raindrops.forEach(r => { let p1 = toScreen(r.x, r.y, r.z); let p2 = toScreen(r.x - r.vx*2.5, r.y - r.vy*2.5, r.z - r.vz*2.5); ctx.strokeStyle = r.color; ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); });
            particles.forEach(p => { let pos = toScreen(p.x, p.y, p.z); ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(pos.x, pos.y, p.size, 0, Math.PI*2); ctx.fill(); });
            ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
            
            clickEffects.forEach(e => { let pos = toScreen(e.x, e.y, e.z + 1); ctx.beginPath(); ctx.ellipse(pos.x, pos.y, e.radius, e.radius*0.5, 0, 0, Math.PI * 2); ctx.strokeStyle = `rgba(16, 185, 129, ${e.alpha})`; ctx.lineWidth = 2.5; ctx.stroke(); });
            ctx.restore();

            let radGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height*0.5, canvas.width/2, canvas.height/2, canvas.height*1.2);
            radGrad.addColorStop(0, 'rgba(18, 18, 26, 0)'); radGrad.addColorStop(1, 'rgba(18, 18, 26, 0.85)'); ctx.fillStyle = radGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function createParticles(x, y, z, color, count) {
            for(let i=0; i<count; i++) {
                let a = Math.random()*Math.PI*2; let s = 2+Math.random()*8;
                particles.push({ x:x, y:y, z:z, vx:Math.cos(a)*s, vy:Math.sin(a)*s, vz:5+Math.random()*10, life:1.0, color:color, size:2+Math.random()*4 });
            }
        }
        function enterGame() {
            if(!currentPortal) return;
            if (currentPortal.id === 'metro') {
                playSound('teleport', 1);
                let otherMetros = portals.filter(p => p.id === 'metro' && p !== currentPortal);
                let targetMetro = otherMetros[Math.floor(Math.random() * otherMetros.length)];
                if(targetMetro) { player.x = targetMetro.x + 100; player.y = targetMetro.y; player.targetX = player.x; player.targetY = player.y; createParticles(player.x, player.y, 10, '#f59e0b', 40); }
            }
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();

    </script>
</body>
